<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#141416" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="NetProbe" />
  <title>NetProbe</title>
  <link rel="manifest" href="/app/manifest.json" />
  <link rel="apple-touch-icon" href="/app/icons/icon-192.svg" />
  <link rel="stylesheet" href="/app/css/app.css" />
</head>
<body>

<!-- ── App shell ─────────────────────────────────────────────────── -->
<div id="app">

  <!-- Sidebar (desktop) / Drawer (mobile) -->
  <nav id="sidebar" class="sidebar" aria-label="Tools">
    <div class="sidebar-header">
      <span class="logo">⬡ NetProbe</span>
      <button id="sidebar-close" class="icon-btn" aria-label="Close menu">✕</button>
    </div>
    <div class="nav-list" id="nav-list"><!-- built by app.js --></div>
  </nav>

  <!-- Overlay for mobile drawer -->
  <div id="overlay" class="overlay" hidden></div>

  <!-- Main content -->
  <div class="main-wrap">
    <header class="topbar">
      <button id="menu-btn" class="icon-btn" aria-label="Open menu">☰</button>
      <span id="topbar-title" class="topbar-title">Ping</span>
      <span id="conn-badge" class="conn-badge disconnected" title="Connection status">●</span>
    </header>

    <main id="view" class="view">
      <!-- Tool views render here -->
    </main>
  </div>

</div>

<script type="module" src="/app/js/app.js"></script>
</body>
</html>
